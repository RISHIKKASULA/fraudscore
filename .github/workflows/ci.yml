name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      # Full pipeline runs on the committed synthetic fixture only —
      # the real data never enters CI (integration tests reduce bootstrap B).
      - name: Test
        run: uv run pytest
